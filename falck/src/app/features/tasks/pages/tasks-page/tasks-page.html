<main class="tasks-page">
  <header class="tasks-page__header">
    <div class="tasks-page__brand">
      <span class="tasks-page__logo" aria-hidden="true">F</span>
      <div>
        <h1>Falck Tasks</h1>
        <p>Gestiona tu trabajo: crea, edita, completa y organiza tus tareas.</p>
      </div>
    </div>
  </header>

  <section id="task-form-pane" class="tasks-page__pane tasks-page__pane--form">
    @defer (on viewport) {
      <app-task-form
        [task]="editing()"
        (submitted)="onSubmit($event)"
        (cancelled)="onCancel()"
      />
    } @placeholder {
      <p class="tasks-page__placeholder">Formulario cargando al acercarte...</p>
    } @loading (minimum 200ms) {
      <p class="tasks-page__placeholder">Cargando formulario...</p>
    }
  </section>

  <section class="tasks-page__pane tasks-page__pane--list">
    <app-task-list (editRequested)="onEditRequested($event)" />
  </section>
</main>
